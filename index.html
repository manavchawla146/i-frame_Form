<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RII Survey</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
    }

    .header {
      background: white;
      padding: 25px 0;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { max-height: 85px; margin-bottom: 10px; }

    .branding {
      font-size: 21px;
      font-weight: 600;
      color: #1e3a8a;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="https://via.placeholder.com/320x90/1e3a8a/ffffff?text=RII+LOGO" class="logo">
    <div class="branding">Research & Insights Initiative</div>
  </div>

  <div class="container">
    <iframe id="gform"
      src="https://docs.google.com/forms/d/e/1FAIpQLScJzRo_adBUg1-Lsm7F40hSXnCWjgmFP1i8alI3eGZfkhEc2g/viewform?embedded=true">
    </iframe>
  </div>

  <script>
    let loadCount = 0;
    let lastLoadTime = Date.now();

    const iframe = document.getElementById('gform');

    iframe.onload = function () {
      loadCount++;

      const now = Date.now();
      const diff = now - lastLoadTime;
      lastLoadTime = now;

      console.log("Load:", loadCount, "| Gap:", diff);

      // ✅ Balanced detection
      if (loadCount >= 3 && diff > 1000) {
        console.log("Redirecting...");

        setTimeout(() => {
          window.location.href = "https://linkxplore.com/savitarrealty";
        }, 2000); // ⏱️ 2 sec delay
      }
    };
  </script>

</body>
</html>
